<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>购房推荐指数计算器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 24px 16px;
    }
    .container { max-width: 680px; margin: 0 auto; }
    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      overflow: hidden;
    }
    .card-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 28px 32px;
      color: white;
    }
    .card-header h1 { font-size: 26px; font-weight: 700; }
    .card-header p { margin-top: 8px; opacity: 0.85; font-size: 14px; }
    .card-body { padding: 28px 32px; }
    .section-title {
      font-size: 16px; font-weight: 600; color: #374151;
      margin: 24px 0 12px; padding-bottom: 8px;
      border-bottom: 2px solid #e5e7eb;
      display: flex; align-items: center; gap: 8px;
    }
    .section-title:first-child { margin-top: 0; }
    .section-icon {
      width: 28px; height: 28px; border-radius: 8px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 14px; color: white; flex-shrink: 0;
    }
    .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-item label {
      display: block; font-size: 13px; color: #6b7280;
      margin-bottom: 4px; font-weight: 500;
    }
    .form-item input, .form-item select {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid #e5e7eb; border-radius: 12px;
      font-size: 15px; outline: none;
      background: #fafafa; color: #1f2937;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-item input:focus, .form-item select:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
      background: white;
    }
    .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 4px; }
    .checkbox-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px; border: 1.5px solid #e5e7eb;
      border-radius: 12px; cursor: pointer; font-size: 14px;
      color: #374151; user-select: none; background: #fafafa;
      transition: all 0.2s;
    }
    .checkbox-item:hover { border-color: #667eea; background: #f0f0ff; }
    .checkbox-item.checked {
      border-color: #667eea;
      background: linear-gradient(135deg, #eef2ff, #e0e7ff);
      color: #4338ca; font-weight: 500;
    }
    .check-box {
      width: 20px; height: 20px; border: 2px solid #d1d5db;
      border-radius: 6px; display: flex; align-items: center;
      justify-content: center; transition: all 0.2s; flex-shrink: 0;
    }
    .checkbox-item.checked .check-box {
      background: #667eea; border-color: #667eea;
    }
    .btn-calculate {
      width: 100%; padding: 14px; border: none; border-radius: 14px;
      font-size: 17px; font-weight: 600; color: white;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      cursor: pointer; margin-top: 24px; letter-spacing: 1px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-calculate:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102,126,234,0.4);
    }
    .btn-calculate:active { transform: translateY(0); }
    .error-msg {
      margin-top: 16px; padding: 10px 16px; background: #fef2f2;
      color: #dc2626; border-radius: 10px; font-size: 14px; text-align: center;
    }
    .result-card {
      margin-top: 24px; border-radius: 16px; overflow: hidden;
      animation: slideUp 0.4s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .result-header { padding: 24px; color: white; text-align: center; }
    .result-score { font-size: 56px; font-weight: 800; line-height: 1; }
    .result-label { font-size: 14px; opacity: 0.9; margin-top: 4px; }
    .progress-bar {
      width: 100%; height: 8px; background: rgba(255,255,255,0.3);
      border-radius: 4px; margin-top: 12px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 4px; background: white;
      transition: width 1s ease; width: 0;
    }
    .recommendation-tag {
      display: inline-block; padding: 6px 20px; border-radius: 20px;
      font-size: 15px; font-weight: 600; margin-top: 10px;
      background: rgba(255,255,255,0.2);
    }
    .result-body { padding: 20px 24px; background: white; }
    .result-body h4 { font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 10px; }
    .result-details { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .detail-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 12px; background: #f9fafb; border-radius: 10px; font-size: 13px;
    }
    .detail-name { color: #6b7280; }
    .detail-value { font-weight: 600; }
    .compare-section { margin-top: 24px; }
    .compare-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
    }
    .compare-header h3 { font-size: 16px; font-weight: 600; color: #374151; }
    .btn-save {
      padding: 6px 16px; border: 1.5px solid #667eea; border-radius: 10px;
      font-size: 13px; font-weight: 500; color: #667eea;
      background: white; cursor: pointer; transition: all 0.2s;
    }
    .btn-save:hover { background: #667eea; color: white; }
    .saved-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; background: #f9fafb; border-radius: 12px;
      font-size: 14px; margin-bottom: 8px;
    }
    .saved-name { font-weight: 500; color: #374151; }
    .saved-right { display: flex; align-items: center; gap: 12px; }
    .saved-score { font-weight: 700; }
    .saved-time { font-size: 12px; color: #9ca3af; }
    .btn-delete {
      background: none; border: none; color: #9ca3af; cursor: pointer;
      font-size: 16px; padding: 2px 6px; border-radius: 6px; transition: all 0.2s;
    }
    .btn-delete:hover { color: #ef4444; background: #fef2f2; }
    .empty-compare { text-align: center; color: #9ca3af; font-size: 14px; padding: 16px; }
    /* 权重配置 */
    .weight-toggle {
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
    }
    .weight-toggle .arrow {
      font-size: 12px; color: #9ca3af; transition: transform 0.3s;
    }
    .weight-toggle .arrow.open { transform: rotate(90deg); }
    .weight-panel {
      max-height: 0; overflow: hidden; transition: max-height 0.35s ease;
    }
    .weight-panel.open { max-height: 600px; }
    .weight-panel-inner { padding-top: 12px; }
    .weight-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px; }
    .weight-item { display: flex; flex-direction: column; gap: 4px; }
    .weight-item-header {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px;
    }
    .weight-item-header .w-label { color: #6b7280; font-weight: 500; }
    .weight-item-header .w-value {
      font-weight: 600; color: #667eea; font-size: 13px;
      min-width: 28px; text-align: right;
    }
    .weight-item input[type="range"] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 6px; border-radius: 3px;
      background: #e5e7eb; outline: none; cursor: pointer;
    }
    .weight-item input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 18px; height: 18px; border-radius: 50%;
      background: #667eea; border: 2px solid white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2); cursor: pointer;
    }
    .weight-item input[type="range"]::-moz-range-thumb {
      width: 18px; height: 18px; border-radius: 50%;
      background: #667eea; border: 2px solid white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2); cursor: pointer;
    }
    .weight-actions {
      display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end;
    }
    .btn-weight-reset {
      padding: 5px 14px; border: 1.5px solid #e5e7eb; border-radius: 8px;
      font-size: 12px; color: #6b7280; background: white;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-weight-reset:hover { border-color: #ef4444; color: #ef4444; }
    .footer {
      text-align: center; color: rgba(255,255,255,0.6);
      font-size: 12px; padding: 16px 0 24px; line-height: 1.8;
    }
    @media (max-width: 640px) {
      .input-group { grid-template-columns: 1fr; }
      .result-details { grid-template-columns: 1fr; }
      .weight-grid { grid-template-columns: 1fr; }
      .card-body { padding: 20px 16px; }
      .card-header { padding: 20px 16px; }
      .result-score { font-size: 44px; }
      .saved-item { flex-direction: column; align-items: flex-start; gap: 6px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <div class="card-header">
      <h1>购房推荐指数计算器</h1>
      <p>多维度评估房源，科学辅助购房决策（自住版）</p>
    </div>
    <div class="card-body">

      <!-- 基本信息 -->
      <div class="section-title">
        <span class="section-icon" style="background:#667eea">&#65509;</span>
        基本信息
      </div>
      <div class="input-group">
        <div class="form-item">
          <label>房源名称（选填）</label>
          <input id="name" placeholder="例：XX小区3号楼" />
        </div>
        <div class="form-item">
          <label>预计成交价（万元）</label>
          <input id="price" type="number" placeholder="例：420" />
        </div>
        <div class="form-item">
          <label>面积（㎡）</label>
          <input id="area" type="number" placeholder="例：95" />
        </div>
        <div class="form-item">
          <label>居室数量</label>
          <input id="rooms" type="number" placeholder="例：3" />
        </div>
        <div class="form-item">
          <label>卫生间数量</label>
          <input id="bathrooms" type="number" placeholder="例：2" />
        </div>
      </div>

      <!-- 房屋属性 -->
      <div class="section-title" style="margin-top:28px">
        <span class="section-icon" style="background:#8b5cf6">&#9750;</span>
        房屋属性
      </div>
      <div class="input-group">
        <div class="form-item">
          <label>朝向</label>
          <select id="direction">
            <option value="">请选择</option>
            <option value="南北">南北通透</option>
            <option value="东西">东西</option>
            <option value="南">朝南</option>
            <option value="东">朝东</option>
            <option value="西">朝西</option>
            <option value="北">朝北</option>
          </select>
        </div>
        <div class="form-item">
          <label>楼层类型</label>
          <select id="floorType">
            <option value="">请选择</option>
            <option value="次顶">次顶层</option>
            <option value="中间">中间层</option>
            <option value="顶层">顶层</option>
            <option value="二层">二层</option>
            <option value="一层">一层/底层</option>
          </select>
        </div>
      </div>

      <!-- 周边配套 -->
      <div class="section-title" style="margin-top:28px">
        <span class="section-icon" style="background:#06b6d4">&#9733;</span>
        周边配套
      </div>
      <div class="input-group">
        <div class="form-item">
          <label>距离地铁（米）</label>
          <input id="subwayDistance" type="number" placeholder="例：800" />
        </div>
        <div class="form-item">
          <label>学校评分（0-3分）</label>
          <input id="schoolScore" type="number" step="0.5" min="0" max="3" placeholder="0-3" />
        </div>
        <div class="form-item">
          <label>位置潜力评分（0-3分）</label>
          <input id="locationScore" type="number" step="0.5" min="0" max="3" placeholder="0-3" />
        </div>
        <div class="form-item">
          <label>小区房龄（年）</label>
          <input id="communityAge" type="number" placeholder="例：8" />
        </div>
      </div>

      <!-- 小区品质 -->
      <div class="section-title" style="margin-top:28px">
        <span class="section-icon" style="background:#f59e0b">&#9830;</span>
        小区品质
      </div>
      <div class="checkbox-group">
        <div class="checkbox-item" id="cb-developerBrand" onclick="toggleCheck('developerBrand')">
          <span class="check-box"></span> 品牌开发商
        </div>
        <div class="checkbox-item" id="cb-separateTraffic" onclick="toggleCheck('separateTraffic')">
          <span class="check-box"></span> 人车分流
        </div>
        <div class="checkbox-item" id="cb-propertyQuality" onclick="toggleCheck('propertyQuality')">
          <span class="check-box"></span> 物业口碑好
        </div>
      </div>

      <!-- 权重配置 -->
      <div class="section-title" style="margin-top:28px">
        <span class="section-icon" style="background:#6366f1">&#9881;</span>
        <div class="weight-toggle" onclick="toggleWeightPanel()">
          <span>权重配置</span>
          <span class="arrow" id="weightArrow">&#9654;</span>
        </div>
      </div>
      <div class="weight-panel" id="weightPanel">
        <div class="weight-panel-inner">
          <div class="weight-grid" id="weightGrid"></div>
          <div class="weight-actions">
            <button class="btn-weight-reset" onclick="resetWeights()">恢复默认</button>
          </div>
        </div>
      </div>

      <div id="errorMsg" class="error-msg" style="display:none"></div>

      <button class="btn-calculate" onclick="calculateScore()">计算推荐指数</button>

      <div id="resultArea"></div>

      <!-- 房源对比 -->
      <div class="compare-section">
        <div class="compare-header">
          <h3>房源对比</h3>
          <button class="btn-save" id="btnSave" style="display:none" onclick="saveResult()">保存当前结果</button>
        </div>
        <div id="savedList">
          <div class="empty-compare">计算后点击「保存当前结果」添加房源对比</div>
        </div>
      </div>

    </div>
  </div>
  <div class="footer">
    购房推荐指数仅供参考，实际购房请综合考虑个人需求<br/>
    理想成交价基准：420万 | 权重可根据实际情况调整
  </div>
</div>

<script>
  var checkState = { developerBrand: false, separateTraffic: false, propertyQuality: false };
  var currentResult = null;
  var savedItems = [];

  // 初始化：从 localStorage 加载保存的对比数据
  try {
    var saved = localStorage.getItem('house_compare_list');
    if (saved) { savedItems = JSON.parse(saved); renderSavedList(); }
  } catch(e) {}

  function val(id) { return document.getElementById(id).value; }

  function toggleCheck(field) {
    checkState[field] = !checkState[field];
    var el = document.getElementById('cb-' + field);
    if (checkState[field]) {
      el.classList.add('checked');
      el.querySelector('.check-box').innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>';
    } else {
      el.classList.remove('checked');
      el.querySelector('.check-box').innerHTML = '';
    }
  }

  var defaultWeights = {
    price: 2.5, area: 1, rooms: 1.8, direction: 1.2, bathrooms: 1,
    traffic: 2, school: 1.8, community: 1.5, floor: 1.2, location: 1.3
  };

  var weights = {};
  for (var k in defaultWeights) weights[k] = defaultWeights[k];

  // 从 localStorage 加载用户自定义权重
  try {
    var savedW = localStorage.getItem('house_weights');
    if (savedW) {
      var parsed = JSON.parse(savedW);
      for (var k in parsed) { if (k in weights) weights[k] = parsed[k]; }
    }
  } catch(e) {}

  var scoreLabels = {
    price: '价格', area: '面积', rooms: '户型', direction: '朝向',
    bathrooms: '卫生间', traffic: '交通', school: '学区',
    community: '小区', floor: '楼层', location: '位置'
  };

  var weightDescriptions = {
    price: '价格越接近理想价越高分',
    area: '面积越大越高分',
    rooms: '三居及以上最高分',
    direction: '南北通透最佳',
    bathrooms: '两卫优于一卫',
    traffic: '越近地铁越高分',
    school: '学区资源评分',
    community: '开发商+物业+人车分流',
    floor: '次顶>中间>顶层>低层',
    location: '区域发展潜力'
  };

  function renderWeightSliders() {
    var html = '';
    var keys = ['price','traffic','rooms','school','community','location','direction','floor','area','bathrooms'];
    for (var i = 0; i < keys.length; i++) {
      var k = keys[i];
      html += '<div class="weight-item">' +
        '<div class="weight-item-header">' +
          '<span class="w-label">' + scoreLabels[k] + '</span>' +
          '<span class="w-value" id="wv-' + k + '">' + weights[k].toFixed(1) + '</span>' +
        '</div>' +
        '<input type="range" min="0" max="3" step="0.1" value="' + weights[k] + '" ' +
          'oninput="updateWeight(\'' + k + '\', this.value)" />' +
      '</div>';
    }
    document.getElementById('weightGrid').innerHTML = html;
  }

  function updateWeight(key, value) {
    weights[key] = parseFloat(value);
    document.getElementById('wv-' + key).textContent = parseFloat(value).toFixed(1);
    try { localStorage.setItem('house_weights', JSON.stringify(weights)); } catch(e) {}
  }

  function resetWeights() {
    for (var k in defaultWeights) weights[k] = defaultWeights[k];
    try { localStorage.removeItem('house_weights'); } catch(e) {}
    renderWeightSliders();
  }

  function toggleWeightPanel() {
    var panel = document.getElementById('weightPanel');
    var arrow = document.getElementById('weightArrow');
    panel.classList.toggle('open');
    arrow.classList.toggle('open');
  }

  renderWeightSliders();

  function calculateScore() {
    var price = Number(val('price'));
    var area = Number(val('area'));
    var rooms = Number(val('rooms'));

    if (!price || !area || !rooms) {
      showError('请至少填写价格、面积和居室数量');
      return;
    }

    var bathrooms = Number(val('bathrooms')) || 1;
    var subwayDistance = Number(val('subwayDistance')) || 2000;
    var communityAge = Number(val('communityAge')) || 20;
    var schoolScore = Math.min(3, Math.max(0, Number(val('schoolScore')) || 0));
    var locationScore = Math.min(3, Math.max(0, Number(val('locationScore')) || 0));
    var direction = val('direction');
    var floorType = val('floorType');

    var priceScore = Math.max(0, 3 - Math.abs(price - 420) / 30);
    var areaScore = area < 90 ? 1 : area < 100 ? 2 : 3;
    var roomScore = rooms >= 3 ? 3 : rooms === 2 ? 1 : 0;

    var directionScore = 0;
    if (direction === '南北') directionScore = 3;
    else if (direction === '东西') directionScore = 2;
    else if (direction === '南' || direction === '东' || direction === '西') directionScore = 1.5;

    var bathScore = bathrooms >= 2 ? 2 : 1;

    var trafficScore = 0;
    if (subwayDistance <= 500) trafficScore = 3;
    else if (subwayDistance <= 1000) trafficScore = 2;
    else if (subwayDistance <= 1500) trafficScore = 1;

    var communityScore = Math.min(3,
      (communityAge <= 10 ? 1 : 0) +
      (checkState.developerBrand ? 1 : 0) +
      (checkState.separateTraffic ? 0.5 : 0) +
      (checkState.propertyQuality ? 0.5 : 0)
    );

    var floorScore = 0;
    if (floorType === '次顶') floorScore = 3;
    else if (floorType === '中间') floorScore = 2;
    else if (floorType === '顶层') floorScore = 1;
    else if (floorType === '二层') floorScore = 0.5;

    var scores = {
      price: priceScore, area: areaScore, rooms: roomScore,
      direction: directionScore, bathrooms: bathScore, traffic: trafficScore,
      school: schoolScore, community: communityScore,
      floor: floorScore, location: locationScore
    };

    var totalScore = 0;
    var maxScore = 0;
    for (var k in weights) {
      totalScore += scores[k] * weights[k];
      maxScore += 3 * weights[k];
    }
    var percentage = (totalScore / maxScore * 100).toFixed(1);

    currentResult = {
      totalScore: totalScore.toFixed(1),
      maxScore: maxScore.toFixed(1),
      percentage: percentage,
      scores: scores
    };

    renderResult();
    document.getElementById('btnSave').style.display = '';
  }

  function getColor(pct) {
    if (pct > 75) return { bg: 'linear-gradient(135deg, #10b981, #059669)', text: '#10b981' };
    if (pct > 60) return { bg: 'linear-gradient(135deg, #f59e0b, #d97706)', text: '#f59e0b' };
    return { bg: 'linear-gradient(135deg, #ef4444, #dc2626)', text: '#ef4444' };
  }

  function getLabel(pct) {
    if (pct > 75) return '强烈推荐';
    if (pct > 60) return '可以考虑';
    return '谨慎选择';
  }

  function getValueColor(v) {
    if (v >= 2) return '#10b981';
    if (v >= 1) return '#f59e0b';
    return '#ef4444';
  }

  function renderResult() {
    var r = currentResult;
    var pct = Number(r.percentage);
    var color = getColor(pct);

    var detailsHtml = '';
    for (var k in r.scores) {
      detailsHtml += '<div class="detail-item">' +
        '<span class="detail-name">' + scoreLabels[k] + '</span>' +
        '<span class="detail-value" style="color:' + getValueColor(r.scores[k]) + '">' +
        r.scores[k].toFixed(1) + ' / 3.0</span></div>';
    }

    document.getElementById('resultArea').innerHTML =
      '<div class="result-card">' +
        '<div class="result-header" style="background:' + color.bg + '">' +
          '<div class="result-score">' + r.percentage + '%</div>' +
          '<div class="result-label">推荐指数（总分 ' + r.totalScore + ' / ' + r.maxScore + '）</div>' +
          '<div class="progress-bar"><div class="progress-fill" id="progressBar"></div></div>' +
          '<div class="recommendation-tag">' + getLabel(pct) + '</div>' +
        '</div>' +
        '<div class="result-body">' +
          '<h4>各维度评分明细</h4>' +
          '<div class="result-details">' + detailsHtml + '</div>' +
        '</div>' +
      '</div>';

    // 触发进度条动画
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        document.getElementById('progressBar').style.width = r.percentage + '%';
      });
    });
  }

  function saveResult() {
    if (!currentResult) return;
    var name = val('name') || ('房源' + (savedItems.length + 1));
    savedItems.push({
      name: name,
      score: currentResult.totalScore,
      percentage: currentResult.percentage,
      time: new Date().toLocaleString('zh-CN')
    });
    try { localStorage.setItem('house_compare_list', JSON.stringify(savedItems)); } catch(e) {}
    renderSavedList();
  }

  function deleteItem(index) {
    savedItems.splice(index, 1);
    try { localStorage.setItem('house_compare_list', JSON.stringify(savedItems)); } catch(e) {}
    renderSavedList();
  }

  function renderSavedList() {
    var el = document.getElementById('savedList');
    if (savedItems.length === 0) {
      el.innerHTML = '<div class="empty-compare">计算后点击「保存当前结果」添加房源对比</div>';
      return;
    }
    var html = '';
    for (var i = 0; i < savedItems.length; i++) {
      var item = savedItems[i];
      var color = getColor(Number(item.percentage));
      html += '<div class="saved-item">' +
        '<span class="saved-name">' + item.name + '</span>' +
        '<div class="saved-right">' +
          '<span class="saved-score" style="color:' + color.text + '">' + item.percentage + '%</span>' +
          '<span class="saved-time">' + item.time + '</span>' +
          '<button class="btn-delete" onclick="deleteItem(' + i + ')" title="删除">&#10005;</button>' +
        '</div></div>';
    }
    el.innerHTML = html;
  }

  function showError(msg) {
    var el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = '';
    setTimeout(function() { el.style.display = 'none'; }, 3000);
  }
</script>

</body>
</html>
