<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>购房推荐指数计算器</title>
  <link href="https://cdn.bootcdn.net/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet" />
  <script src="https://cdn.bootcdn.net/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      overflow: hidden;
    }
    .card-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 28px 32px;
      color: white;
    }
    .card-header h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 700;
    }
    .card-header p {
      margin: 8px 0 0;
      opacity: 0.85;
      font-size: 14px;
    }
    .card-body { padding: 28px 32px; }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #374151;
      margin: 20px 0 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e5e7eb;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title:first-child { margin-top: 0; }
    .section-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: white;
      flex-shrink: 0;
    }
    .input-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 640px) {
      .input-group { grid-template-columns: 1fr; }
      .card-body { padding: 20px 16px; }
      .card-header { padding: 20px 16px; }
    }
    .form-item { position: relative; }
    .form-item label {
      display: block;
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 4px;
      font-weight: 500;
    }
    .form-item input, .form-item select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 12px;
      font-size: 15px;
      transition: all 0.2s;
      outline: none;
      background: #fafafa;
      color: #1f2937;
    }
    .form-item input:focus, .form-item select:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
      background: white;
    }
    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
    }
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border: 1.5px solid #e5e7eb;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
      color: #374151;
      user-select: none;
      background: #fafafa;
    }
    .checkbox-item:hover { border-color: #667eea; background: #f0f0ff; }
    .checkbox-item.checked {
      border-color: #667eea;
      background: linear-gradient(135deg, #eef2ff, #e0e7ff);
      color: #4338ca;
      font-weight: 500;
    }
    .checkbox-item input { display: none; }
    .check-icon {
      width: 20px;
      height: 20px;
      border: 2px solid #d1d5db;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .checkbox-item.checked .check-icon {
      background: #667eea;
      border-color: #667eea;
    }
    .btn-calculate {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 24px;
      letter-spacing: 1px;
    }
    .btn-calculate:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102,126,234,0.4);
    }
    .btn-calculate:active { transform: translateY(0); }
    .result-card {
      margin-top: 24px;
      border-radius: 16px;
      overflow: hidden;
      animation: slideUp 0.4s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .result-header {
      padding: 24px;
      color: white;
      text-align: center;
    }
    .result-score {
      font-size: 56px;
      font-weight: 800;
      line-height: 1;
    }
    .result-label {
      font-size: 14px;
      opacity: 0.9;
      margin-top: 4px;
    }
    .result-body { padding: 20px 24px; background: white; }
    .result-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .detail-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: #f9fafb;
      border-radius: 10px;
      font-size: 13px;
    }
    .detail-item .name { color: #6b7280; }
    .detail-item .value { font-weight: 600; color: #374151; }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.3);
      border-radius: 4px;
      margin-top: 12px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 4px;
      background: white;
      transition: width 1s ease;
    }
    .recommendation-tag {
      display: inline-block;
      padding: 6px 20px;
      border-radius: 20px;
      font-size: 15px;
      font-weight: 600;
      margin-top: 10px;
      background: rgba(255,255,255,0.2);
    }
    .compare-section { margin-top: 24px; }
    .compare-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .compare-header h3 {
      font-size: 16px;
      font-weight: 600;
      color: #374151;
      margin: 0;
    }
    .btn-save {
      padding: 6px 16px;
      border: 1.5px solid #667eea;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      color: #667eea;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-save:hover { background: #667eea; color: white; }
    .saved-list { display: flex; flex-direction: column; gap: 8px; }
    .saved-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #f9fafb;
      border-radius: 12px;
      font-size: 14px;
    }
    .saved-item .saved-name { font-weight: 500; color: #374151; }
    .saved-item .saved-score { font-weight: 700; }
    .btn-delete {
      background: none;
      border: none;
      color: #9ca3af;
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .btn-delete:hover { color: #ef4444; background: #fef2f2; }
    .empty-compare {
      text-align: center;
      color: #9ca3af;
      font-size: 14px;
      padding: 16px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [form, setForm] = useState({
        name: "",
        price: "",
        area: "",
        rooms: "",
        direction: "",
        bathrooms: "",
        subwayDistance: "",
        schoolScore: "",
        communityAge: "",
        developerBrand: false,
        separateTraffic: false,
        propertyQuality: false,
        floorType: "",
        locationScore: "",
      });

      const [result, setResult] = useState(null);
      const [savedList, setSavedList] = useState([]);
      const [showError, setShowError] = useState("");

      useEffect(() => {
        try {
          const saved = localStorage.getItem("house_compare_list");
          if (saved) setSavedList(JSON.parse(saved));
        } catch(e) {}
      }, []);

      const weights = {
        price: 2.5,
        area: 1,
        rooms: 1.8,
        direction: 1.2,
        bathrooms: 1,
        traffic: 2,
        school: 1.8,
        community: 1.5,
        floor: 1.2,
        location: 1.3,
      };

      const calculateScore = () => {
        if (!form.price || !form.area || !form.rooms) {
          setShowError("请至少填写价格、面积和居室数量");
          setTimeout(() => setShowError(""), 3000);
          return;
        }

        const idealPrice = 420;
        const price = Number(form.price);
        const area = Number(form.area);
        const rooms = Number(form.rooms);
        const bathrooms = Number(form.bathrooms) || 1;
        const subwayDistance = Number(form.subwayDistance) || 2000;
        const communityAge = Number(form.communityAge) || 20;
        const schoolScore = Math.min(3, Math.max(0, Number(form.schoolScore) || 0));
        const locationScore = Math.min(3, Math.max(0, Number(form.locationScore) || 0));

        const priceScore = Math.max(0, 3 - Math.abs(price - idealPrice) / 30);
        const areaScore = area < 90 ? 1 : area < 100 ? 2 : 3;
        const roomScore = rooms >= 3 ? 3 : rooms === 2 ? 1 : 0;
        const directionScore =
          form.direction === "南北" ? 3 :
          form.direction === "东西" ? 2 :
          (form.direction === "南" || form.direction === "东" || form.direction === "西") ? 1.5 : 0;
        const bathScore = bathrooms >= 2 ? 2 : 1;
        const trafficScore =
          subwayDistance <= 500 ? 3 :
          subwayDistance <= 1000 ? 2 :
          subwayDistance <= 1500 ? 1 : 0;
        const communityScore = Math.min(3,
          (communityAge <= 10 ? 1 : 0) +
          (form.developerBrand ? 1 : 0) +
          (form.separateTraffic ? 0.5 : 0) +
          (form.propertyQuality ? 0.5 : 0)
        );
        const floorScore =
          form.floorType === "次顶" ? 3 :
          form.floorType === "中间" ? 2 :
          form.floorType === "顶层" ? 1 :
          form.floorType === "二层" ? 0.5 : 0;

        const scores = {
          price: priceScore,
          area: areaScore,
          rooms: roomScore,
          direction: directionScore,
          bathrooms: bathScore,
          traffic: trafficScore,
          school: schoolScore,
          community: communityScore,
          floor: floorScore,
          location: locationScore,
        };

        const totalScore =
          priceScore * weights.price +
          areaScore * weights.area +
          roomScore * weights.rooms +
          directionScore * weights.direction +
          bathScore * weights.bathrooms +
          trafficScore * weights.traffic +
          schoolScore * weights.school +
          communityScore * weights.community +
          floorScore * weights.floor +
          locationScore * weights.location;

        const maxScore = 3 * Object.values(weights).reduce((a, b) => a + b, 0);
        const percentage = ((totalScore / maxScore) * 100).toFixed(1);

        setResult({ totalScore: totalScore.toFixed(1), maxScore: maxScore.toFixed(1), percentage, scores });
      };

      const handleChange = (e) => {
        const { name, value, type, checked } = e.target;
        setForm({ ...form, [name]: type === "checkbox" ? checked : value });
      };

      const toggleCheck = (field) => {
        setForm({ ...form, [field]: !form[field] });
      };

      const saveResult = () => {
        if (!result) return;
        const name = form.name || ("房源" + (savedList.length + 1));
        const item = { name, score: result.totalScore, percentage: result.percentage, time: new Date().toLocaleString("zh-CN") };
        const newList = [...savedList, item];
        setSavedList(newList);
        try { localStorage.setItem("house_compare_list", JSON.stringify(newList)); } catch(e) {}
      };

      const deleteItem = (index) => {
        const newList = savedList.filter((_, i) => i !== index);
        setSavedList(newList);
        try { localStorage.setItem("house_compare_list", JSON.stringify(newList)); } catch(e) {}
      };

      const getColor = (pct) => {
        if (pct > 75) return { bg: "linear-gradient(135deg, #10b981, #059669)", text: "#10b981" };
        if (pct > 60) return { bg: "linear-gradient(135deg, #f59e0b, #d97706)", text: "#f59e0b" };
        return { bg: "linear-gradient(135deg, #ef4444, #dc2626)", text: "#ef4444" };
      };

      const getLabel = (pct) => {
        if (pct > 75) return "强烈推荐";
        if (pct > 60) return "可以考虑";
        return "谨慎选择";
      };

      const scoreLabels = {
        price: "价格", area: "面积", rooms: "户型", direction: "朝向",
        bathrooms: "卫生间", traffic: "交通", school: "学区",
        community: "小区", floor: "楼层", location: "位置",
      };

      return (
        <div style={{ padding: "24px 16px", maxWidth: 680, margin: "0 auto", minHeight: "100vh" }}>
          <div className="card">
            <div className="card-header">
              <h1>购房推荐指数计算器</h1>
              <p>多维度评估房源，科学辅助购房决策（自住版）</p>
            </div>
            <div className="card-body">
              {/* 基本信息 */}
              <div className="section-title">
                <span className="section-icon" style={{ background: "#667eea" }}>$</span>
                基本信息
              </div>
              <div className="input-group">
                <div className="form-item">
                  <label>房源名称（选填）</label>
                  <input name="name" value={form.name} placeholder="例：XX小区3号楼" onChange={handleChange} />
                </div>
                <div className="form-item">
                  <label>预计成交价（万元）</label>
                  <input name="price" type="number" value={form.price} placeholder="例：420" onChange={handleChange} />
                </div>
                <div className="form-item">
                  <label>面积（㎡）</label>
                  <input name="area" type="number" value={form.area} placeholder="例：95" onChange={handleChange} />
                </div>
                <div className="form-item">
                  <label>居室数量</label>
                  <input name="rooms" type="number" value={form.rooms} placeholder="例：3" onChange={handleChange} />
                </div>
                <div className="form-item">
                  <label>卫生间数量</label>
                  <input name="bathrooms" type="number" value={form.bathrooms} placeholder="例：2" onChange={handleChange} />
                </div>
              </div>

              {/* 房屋属性 */}
              <div className="section-title" style={{ marginTop: 28 }}>
                <span className="section-icon" style={{ background: "#8b5cf6" }}>&#9750;</span>
                房屋属性
              </div>
              <div className="input-group">
                <div className="form-item">
                  <label>朝向</label>
                  <select name="direction" value={form.direction} onChange={handleChange}>
                    <option value="">请选择</option>
                    <option value="南北">南北通透</option>
                    <option value="东西">东西</option>
                    <option value="南">朝南</option>
                    <option value="东">朝东</option>
                    <option value="西">朝西</option>
                    <option value="北">朝北</option>
                  </select>
                </div>
                <div className="form-item">
                  <label>楼层类型</label>
                  <select name="floorType" value={form.floorType} onChange={handleChange}>
                    <option value="">请选择</option>
                    <option value="次顶">次顶层</option>
                    <option value="中间">中间层</option>
                    <option value="顶层">顶层</option>
                    <option value="二层">二层</option>
                    <option value="一层">一层/底层</option>
                  </select>
                </div>
              </div>

              {/* 周边配套 */}
              <div className="section-title" style={{ marginTop: 28 }}>
                <span className="section-icon" style={{ background: "#06b6d4" }}>&#9733;</span>
                周边配套
              </div>
              <div className="input-group">
                <div className="form-item">
                  <label>距离地铁（米）</label>
                  <input name="subwayDistance" type="number" value={form.subwayDistance} placeholder="例：800" onChange={handleChange} />
                </div>
                <div className="form-item">
                  <label>学校评分（0-3分）</label>
                  <input name="schoolScore" type="number" step="0.5" min="0" max="3" value={form.schoolScore} placeholder="0-3" onChange={handleChange} />
                </div>
                <div className="form-item">
                  <label>位置潜力评分（0-3分）</label>
                  <input name="locationScore" type="number" step="0.5" min="0" max="3" value={form.locationScore} placeholder="0-3" onChange={handleChange} />
                </div>
                <div className="form-item">
                  <label>小区房龄（年）</label>
                  <input name="communityAge" type="number" value={form.communityAge} placeholder="例：8" onChange={handleChange} />
                </div>
              </div>

              {/* 小区品质 */}
              <div className="section-title" style={{ marginTop: 28 }}>
                <span className="section-icon" style={{ background: "#f59e0b" }}>&#9830;</span>
                小区品质
              </div>
              <div className="checkbox-group">
                <div className={"checkbox-item" + (form.developerBrand ? " checked" : "")} onClick={() => toggleCheck("developerBrand")}>
                  <span className="check-icon">{form.developerBrand ? <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg> : null}</span>
                  品牌开发商
                </div>
                <div className={"checkbox-item" + (form.separateTraffic ? " checked" : "")} onClick={() => toggleCheck("separateTraffic")}>
                  <span className="check-icon">{form.separateTraffic ? <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg> : null}</span>
                  人车分流
                </div>
                <div className={"checkbox-item" + (form.propertyQuality ? " checked" : "")} onClick={() => toggleCheck("propertyQuality")}>
                  <span className="check-icon">{form.propertyQuality ? <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg> : null}</span>
                  物业口碑好
                </div>
              </div>

              {/* 错误提示 */}
              {showError && (
                <div style={{ marginTop: 16, padding: "10px 16px", background: "#fef2f2", color: "#dc2626", borderRadius: 10, fontSize: 14, textAlign: "center" }}>
                  {showError}
                </div>
              )}

              {/* 计算按钮 */}
              <button className="btn-calculate" onClick={calculateScore}>
                计算推荐指数
              </button>

              {/* 结果展示 */}
              {result && (() => {
                const pct = Number(result.percentage);
                const color = getColor(pct);
                return (
                  <div className="result-card">
                    <div className="result-header" style={{ background: color.bg }}>
                      <div className="result-score">{result.percentage}%</div>
                      <div className="result-label">推荐指数（总分 {result.totalScore} / {result.maxScore}）</div>
                      <div className="progress-bar">
                        <div className="progress-fill" style={{ width: result.percentage + "%" }}></div>
                      </div>
                      <div className="recommendation-tag">{getLabel(pct)}</div>
                    </div>
                    <div className="result-body">
                      <div style={{ fontSize: 14, fontWeight: 600, color: "#374151", marginBottom: 10 }}>各维度评分明细</div>
                      <div className="result-details">
                        {Object.entries(result.scores).map(([key, val]) => (
                          <div className="detail-item" key={key}>
                            <span className="name">{scoreLabels[key]}</span>
                            <span className="value" style={{ color: val >= 2 ? "#10b981" : val >= 1 ? "#f59e0b" : "#ef4444" }}>
                              {val.toFixed(1)} / 3.0
                            </span>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                );
              })()}

              {/* 房源对比 */}
              <div className="compare-section">
                <div className="compare-header">
                  <h3>房源对比</h3>
                  {result && (
                    <button className="btn-save" onClick={saveResult}>保存当前结果</button>
                  )}
                </div>
                {savedList.length === 0 ? (
                  <div className="empty-compare">计算后点击「保存当前结果」添加房源对比</div>
                ) : (
                  <div className="saved-list">
                    {savedList.map((item, i) => {
                      const pct = Number(item.percentage);
                      const color = getColor(pct);
                      return (
                        <div className="saved-item" key={i}>
                          <span className="saved-name">{item.name}</span>
                          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                            <span className="saved-score" style={{ color: color.text }}>{item.percentage}%</span>
                            <span style={{ fontSize: 12, color: "#9ca3af" }}>{item.time}</span>
                            <button className="btn-delete" onClick={() => deleteItem(i)} title="删除">✕</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>
          </div>
          <div style={{ textAlign: "center", color: "rgba(255,255,255,0.6)", fontSize: 12, padding: "16px 0 24px", lineHeight: 1.8 }}>
            购房推荐指数仅供参考，实际购房请综合考虑个人需求<br/>
            理想成交价基准：420万 | 权重可根据实际情况调整
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
